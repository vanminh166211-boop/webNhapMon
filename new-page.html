<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trang moi</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: #1f2937;
      background: #f4f7fb;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: min(720px, 100%);
      background: #ffffff;
      border: 1px solid #dbe3ef;
      border-radius: 8px;
      padding: 32px;
      box-shadow: 0 12px 30px rgba(31, 41, 55, 0.08);
    }

    h1 {
      margin-bottom: 12px;
      font-size: 32px;
      color: #0f172a;
    }

    p {
      margin-bottom: 24px;
      line-height: 1.6;
      color: #475569;
    }

    .button {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 6px;
      background: #2563eb;
      color: #ffffff;
      text-decoration: none;
      font-weight: 700;
    }

    .button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Xin chao!</h1>
    <p>Day la file HTML moi co CSS rieng ben trong. Ban co the chinh sua noi dung va giao dien theo nhu cau.</p>
    <a class="button" href="index.html">Quay ve trang chu</a>
  </main>
</body>
</html>
